<main class="todo-app">
  <section class="todo-panel" aria-labelledby="todo-title">
    <header class="todo-header">
      <h1 id="todo-title">theJsPythonGuy Todo List</h1>
      <p>{{ todos().length }} task{{ todos().length === 1 ? '' : 's' }}</p>
    </header>

    <form
      class="todo-form"
      (submit)="todoInput.value.trim() && addTodo(todoInput.value.trim()); todoInput.value = ''; $event.preventDefault()"
    >
      <label for="todo-input">New todo</label>
      <div class="todo-input-row">
        <input
          #todoInput
          id="todo-input"
          type="text"
          name="todo"
          placeholder="Add a new task"
          autocomplete="off"
        />
        <button type="submit">Add</button>
      </div>
    </form>

    @if (todos().length) {
      <ul class="todo-list" aria-label="Todo list">
        @for (todo of todos(); track todo.id) {
          <li class="todo-item" [class.completed]="todo.status">
            <label>
              <input
                type="checkbox"
                [checked]="todo.status"
                (change)="toggleStatus(todo.id)"
              />
              <span>{{ todo.title }}</span>
            </label>
          </li>
        }
      </ul>
    } @else {
      <p class="empty-state">No todos yet. Add your first task above.</p>
    }
  </section>
</main>

<router-outlet />
